<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="배달 라이더 전용 정산 시스템입니다. 배달 건별 내역과 주간 정산을 한곳에서 기록·관리할 수 있습니다.">
  <title>정산타임</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚴</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 1rem;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    }
    .icon {
      width: 4rem;
      height: 4rem;
      background: #2563eb;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚴</div>
    <h1>라이더 정산 시스템</h1>
    <p>라이더 정산 및 관리 시스템에 오신 것을 환영합니다.</p>
    <a href="/login" class="btn">로그인</a>
  </div>
  <p class="footer">© 라이더 정산 시스템</p>
</body>
</html>
