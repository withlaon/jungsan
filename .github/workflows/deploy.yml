name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:   # 수동 트리거 버튼 활성화

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jungsan-app/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Create Vercel project config
        run: |
          mkdir -p jungsan-app/.vercel
          echo '{
            "orgId": "${{ secrets.VERCEL_ORG_ID }}",
            "projectId": "${{ secrets.VERCEL_PROJECT_ID }}"
          }' > jungsan-app/.vercel/project.json

      - name: Pull Vercel Environment Variables
        working-directory: ./jungsan-app
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        id: build
        working-directory: ./jungsan-app
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        if: steps.build.outcome == 'success'
        working-directory: ./jungsan-app
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
